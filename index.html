    function useNavHighlight() {
      useEffect(() => {
        const navLinks = document.querySelectorAll('.ul-list li a');
        const sections = document.querySelectorAll('section');

        const removeActive = () => navLinks.forEach(link => link.parentElement.classList.remove('active'));

        const onScroll = () => {
          const scrollPos = window.scrollY + 120;
          sections.forEach(section => {
            if (scrollPos >= section.offsetTop && scrollPos < section.offsetTop + section.offsetHeight) {
              removeActive();
              const activeLink = document.querySelector(`.ul-list li a[href="#${section.id}"]`);
              if (activeLink) activeLink.parentElement.classList.add('active');
            }
          });
        };

        navLinks.forEach(link => {
          link.addEventListener('click', e => {
            e.preventDefault();
            const targetId = link.getAttribute('href').substring(1);
            const targetSection = document.getElementById(targetId);
            if (targetSection) {
              window.scrollTo({ top: targetSection.offsetTop - 70, behavior: 'smooth' });
              removeActive();
              link.parentElement.classList.add('active');
            }
          });
        });

        window.addEventListener('scroll', onScroll);
        onScroll();
        return () => window.removeEventListener('scroll', onScroll);
      }, []);
    }

    function useReveal() {
      useEffect(() => {
        const revealElements = document.querySelectorAll('.reveal');
        const handler = () => {
          revealElements.forEach(el => {
            const windowHeight = window.innerHeight;
            const elementTop = el.getBoundingClientRect().top;
            const revealPoint = 150;
            if (elementTop < windowHeight - revealPoint) {
              el.classList.add('active-reveal');
            }
          });
        };
        window.addEventListener('scroll', handler);
        handler();
        return () => window.removeEventListener('scroll', handler);
      }, []);
    }

    function useBackToTop() {
      useEffect(() => {
        const btn = document.getElementById('back-to-top');
        if (!btn) return;

        const onScroll = () => {
          btn.style.display = window.scrollY > 500 ? 'flex' : 'none';
        };

        btn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
        window.addEventListener('scroll', onScroll);
        onScroll();
        return () => window.removeEventListener('scroll', onScroll);
      }, []);
    }

    function useProjectDrag() {
      useEffect(() => {
        const container = document.querySelector('.projects-container');
        if (!container) return;
        let isDragging = false;
        let startX = 0;
        let scrollStart = 0;

        const startDrag = (e) => {
          isDragging = true;
          container.classList.add('dragging');
          startX = (e.pageX || e.touches[0].pageX) - container.offsetLeft;
          scrollStart = container.scrollLeft;
        };

        const stopDrag = () => {
          isDragging = false;
          container.classList.remove('dragging');
        };

        const onDrag = (e) => {
          if (!isDragging) return;
          e.preventDefault();
          const x = (e.pageX || e.touches[0].pageX) - container.offsetLeft;
          const walk = x - startX;
          container.scrollLeft = scrollStart - walk;
        };

        container.addEventListener('mousedown', startDrag);
        container.addEventListener('touchstart', startDrag, { passive: true });
        container.addEventListener('mousemove', onDrag);
        container.addEventListener('touchmove', onDrag, { passive: false });
        container.addEventListener('mouseleave', stopDrag);
        ['mouseup', 'touchend', 'touchcancel'].forEach(evt => container.addEventListener(evt, stopDrag));

        return () => {
          container.removeEventListener('mousedown', startDrag);
          container.removeEventListener('touchstart', startDrag);
          container.removeEventListener('mousemove', onDrag);
          container.removeEventListener('touchmove', onDrag);
          container.removeEventListener('mouseleave', stopDrag);
          ['mouseup', 'touchend', 'touchcancel'].forEach(evt => container.removeEventListener(evt, stopDrag));
        };
      }, []);
    }
